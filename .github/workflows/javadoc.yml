name: Javadoc

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  javadoc:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Install MASON dependency locally
        run: mvn -B install:install-file -Dfile=lib/mason-21.jar -DgroupId=sim -DartifactId=mason -Dversion=21 -Dpackaging=jar

      - name: Generate Javadoc
        run: mvn -B -DskipTests javadoc:javadoc
